name: CI — Build, TypeScript, Lint, Test

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: file:./test.db
      JWT_SECRET: ci-test-secret-do-not-use-in-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify no secrets in source
        run: |
          if grep -rE '(sk-|password=|secret=|token=|api_key=)[^"\'\s]{8,}' src/ --include='*.ts' --include='*.tsx' || false; then
            echo "ERROR: Potential hardcoded secret detected"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: TypeScript strict validation
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      - name: ESLint validation
        run: npm run lint
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Setup Playwright
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npx prisma migrate deploy
        continue-on-error: true

      - name: Run Playwright e2e tests
        run: npx playwright test
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.14.x
          lhci autorun
        continue-on-error: true
